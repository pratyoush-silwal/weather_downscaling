# Central configuration for paths, date ranges, variables, region bounds, model settings, and training hyperparameters.

region:
  name: nepal
  lat_min: 26.0
  lat_max: 31.0
  lon_min: 80.0
  lon_max: 89.0
  resolution_deg: 0.05

